[phases.setup]
nixPkgs = ["python3"]
aptPkgs = ["libgl1-mesa-glx", "libglib2.0-0", "libsm6", "libxrender1", "libxext6", "libxcb1", "libgomp1"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHON_VERSION = "3.11"
