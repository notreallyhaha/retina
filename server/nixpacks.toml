[phases.setup]
nixPkgs = ["python3"]

[phases.install]
cmds = [
  "apt-get update && apt-get install -y libxcb1 libgl1 libglib2.0-0 libsm6 libxrender1 libxext6 libgomp1",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHON_VERSION = "3.11"
