[phases.setup]
nixPkgs = ["python311"]
aptPkgs = ["libgl1-mesa-glx", "libglib2.0-0"]

[phases.install]
cmds = ["cd server && pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["echo 'Building server...'"]

[start]
cmd = "cd server && uvicorn main:app --host 0.0.0.0 --port $PORT"

