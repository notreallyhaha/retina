[phases.setup]
nixPkgs = ["python311"]
aptPkgs = ["libgl1", "libglib2.0-0", "libxcb1"]

[phases.install]
cmds = ["cd server && pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["pip uninstall -y opencv-python", "pip install --no-cache-dir opencv-python-headless"]

[start]
cmd = "cd server && uvicorn main:app --host 0.0.0.0 --port $PORT"

